<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anubis Digital | AR Gallery</title>

    <!-- A-Frame + 8th Wall XR -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script async src="xr.js" data-preload-chunks="slam"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* strict industrial: no border-radius, dark monospace, no emoji */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border-radius: 0px !important;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            color: #ffffff;
        }

        /* ---------- LOADER ---------- */
        #init-loader {
            position: fixed;
            inset: 0;
            background: #000000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .init-header {
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 700;
            margin-bottom: 30px;
            border-left: 4px solid #ffffff;
            padding-left: 18px;
        }

        .progress-container {
            width: 100%;
            max-width: 280px;
            height: 2px;
            background: #1a1a1a;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #ffffff;
        }

        .status-text {
            margin-top: 14px;
            font-size: 10px;
            letter-spacing: 1px;
            color: #5a5a5a;
            text-transform: uppercase;
        }

        /* ---------- LEFT DRAWER (100% HEIGHT) ---------- */
        #side-drawer {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background: #0a0a0a;
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 1100;
            transition: left 0.35s cubic-bezier(0.2, 0.9, 0.4, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 40px rgba(0,0,0,0.6);
        }

        #side-drawer.open {
            left: 0;
        }

        .drawer-header {
            padding: 28px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-brand {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .drawer-content {
            flex: 1;
            padding: 24px 20px;
            overflow-y: auto;
        }

        .asset-section {
            margin-bottom: 34px;
        }

        .section-label {
            font-size: 9px;
            color: #656565;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: block;
            letter-spacing: 1.5px;
        }

        .asset-btn {
            width: 100%;
            padding: 14px 16px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            text-align: left;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .asset-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .asset-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .action-btn {
            background: #111111;
            border: 1px solid #2a2a2a;
        }

        .action-btn:hover {
            background: #202020;
        }

        /* ---------- MAIN UI OVERLAY ---------- */
        #ui-main {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #ui-main > * {
            pointer-events: auto;
        }

        .top-bar {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-btn {
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: #181818;
        }

        .torch-btn {
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 500;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .torch-btn.active {
            background: #ffffff;
            color: #000000;
        }

        .bottom-info {
            padding: 28px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
        }

        .bottom-title {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .bottom-caption {
            font-size: 10px;
            color: #8a8a8a;
            max-width: 260px;
        }

        /* placement hint */
        #placement-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid #ffffff;
            padding: 12px 24px;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.65);
            white-space: nowrap;
            display: none;
            backdrop-filter: blur(4px);
        }

        #toast-msg {
            position: fixed;
            bottom: 100px;
            left: 24px;
            background: #ffffff;
            color: #000000;
            padding: 10px 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
            z-index: 1200;
        }

        @media (max-width: 600px) {
            #side-drawer { width: 280px; left: -280px; }
            .asset-btn { padding: 12px 14px; font-size: 11px; }
            .bottom-title { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- BOOT LOADER -->
    <div id="init-loader">
        <div class="init-header">ANUBIS CORE</div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="status-text" id="boot-status">initializing engine...</div>
    </div>

    <!-- LEFT DRAWER (100% height) -->
    <div id="side-drawer">
        <div class="drawer-header">
            <span class="drawer-brand">ASSET VAULT</span>
            <button class="icon-btn" id="close-drawer-btn"><i data-lucide="x"></i></button>
        </div>
        <div class="drawer-content">
            <div class="asset-section">
                <span class="section-label">PHYSICAL WORLD MODELS</span>
                <div id="asset-list-container"></div>
            </div>
            <div class="asset-section">
                <span class="section-label">TOOLS</span>
                <button class="asset-btn action-btn" id="clear-all-btn">CLEAR ALL PLACEMENTS</button>
                <button class="asset-btn action-btn" id="recenter-btn">RECENTER AR</button>
                <button class="asset-btn action-btn" id="hard-reset-btn">REINITIALIZE SESSION</button>
            </div>
        </div>
    </div>

    <!-- UI FLOATING ELEMENTS -->
    <div id="ui-main">
        <div class="top-bar">
            <button class="icon-btn" id="open-drawer-btn"><i data-lucide="menu"></i></button>
            <button id="torch-control" class="torch-btn"><i data-lucide="zap"></i><span>FLASH</span></button>
        </div>
        <div id="placement-hint">TAP GROUND → PLACE IMAGE</div>
        <div class="bottom-info">
            <h2 id="current-asset-name" class="bottom-title">Dumbo Octopus</h2>
            <p class="bottom-caption">Active asset will be placed as image card · tap card to open full model on Sketchfab</p>
        </div>
    </div>

    <div id="toast-msg">ready</div>

    <!-- A-FRAME SCENE with XR8 -->
    <a-scene
        xrweb="allowedDevices: any;"
        xrextras-gesture-detector
        xrextras-runtime-error
        renderer="colorManagement: true; antialias: true;">

        <!-- camera + cursor for raycasting -->
        <a-camera id="main-camera" position="0 8 8" raycaster="objects: .placement-ground, .placed-image" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

        <!-- ambient + directional lighting -->
        <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
        <a-entity light="type: directional; intensity: 1.0; position: 2 5 3;"></a-entity>

        <!-- ground that receives taps for placement -->
        <a-plane class="placement-ground" geometry="primitive: plane; width: 1000; height: 1000" material="transparent: true; opacity: 0" rotation="-90 0 0"></a-plane>

        <!-- container for dynamically placed image entities -->
        <a-entity id="placed-container"></a-entity>
    </a-scene>

    <script>
        // ------------------------- ASSET CATALOG (Sketchfab based) -------------------------
        const ASSETS = [
            {
                name: "Dumbo Octopus",
                modelId: "f4878c34712c4277931822ad2529aa28",
                sketchfabUrl: "https://sketchfab.com/3d-models/dumbo-octopus-f4878c34712c4277931822ad2529aa28",
                thumbUrl: "https://media.sketchfab.com/models/f4878c34712c4277931822ad2529aa28/thumbnails/thumbnail.jpg"
            },
            {
                name: "Captain Mizuki",
                modelId: "c3b8252e770943f78662f2112dff418b",
                sketchfabUrl: "https://sketchfab.com/3d-models/captain-mizuki-3d-model-c3b8252e770943f78662f2112dff418b",
                thumbUrl: "https://media.sketchfab.com/models/c3b8252e770943f78662f2112dff418b/thumbnails/thumbnail.jpg"
            },
            {
                name: "High Egg Prices",
                modelId: "d5a31c37827d4e2ea39ecddbc3e91b03",
                sketchfabUrl: "https://sketchfab.com/3d-models/high-egg-prices-on-fab-d5a31c37827d4e2ea39ecddbc3e91b03",
                thumbUrl: "https://media.sketchfab.com/models/d5a31c37827d4e2ea39ecddbc3e91b03/thumbnails/thumbnail.jpg"
            },
            {
                name: "Carrot Cake",
                modelId: "c9cda700ec94412cab968b03a3367968",
                sketchfabUrl: "https://sketchfab.com/3d-models/carrot-cake-c9cda700ec94412cab968b03a3367968",
                thumbUrl: "https://media.sketchfab.com/models/c9cda700ec94412cab968b03a3367968/thumbnails/thumbnail.jpg"
            },
            {
                name: "Croissant",
                modelId: "3d570199294d492184ddbb2476819ff4",
                sketchfabUrl: "https://sketchfab.com/3d-models/croissant-3d570199294d492184ddbb2476819ff4",
                thumbUrl: "https://media.sketchfab.com/models/3d570199294d492184ddbb2476819ff4/thumbnails/thumbnail.jpg"
            },
            {
                name: "German Shepherd",
                modelId: "3ff58bcbea224720a54d4a2e54226859",
                sketchfabUrl: "https://sketchfab.com/3d-models/animated-german-sheperd-3d-animal-model-3ff58bcbea224720a54d4a2e54226859",
                thumbUrl: "https://media.sketchfab.com/models/3ff58bcbea224720a54d4a2e54226859/thumbnails/thumbnail.jpg"
            }
        ];

        // DEFAULTS
        let currentAssetIndex = 0;
        let isDrawerOpen = false;
        let isFlashActive = false;
        let mediaStreamTrack = null;

        // DOM references
        const drawer = document.getElementById('side-drawer');
        const openBtn = document.getElementById('open-drawer-btn');
        const closeBtn = document.getElementById('close-drawer-btn');
        const torchBtn = document.getElementById('torch-control');
        const clearAllBtn = document.getElementById('clear-all-btn');
        const recenterBtn = document.getElementById('recenter-btn');
        const resetBtn = document.getElementById('hard-reset-btn');
        const assetListContainer = document.getElementById('asset-list-container');
        const currentAssetNameSpan = document.getElementById('current-asset-name');
        const placementHint = document.getElementById('placement-hint');
        const toastMsgDiv = document.getElementById('toast-msg');
        const progressBar = document.getElementById('progress-bar');
        const bootStatusSpan = document.getElementById('boot-status');

        // helper: toast message
        function showMessage(msg, duration = 2000) {
            toastMsgDiv.innerText = msg;
            toastMsgDiv.style.opacity = '1';
            setTimeout(() => {
                toastMsgDiv.style.opacity = '0';
            }, duration);
        }

        // UI loader animation + real boot simulation
        function simulateLoaderAndStart() {
            let prog = 0;
            const steps = ["loading XR runtime", "validating camera", "activating SLAM", "building asset registry", "ready"];
            const interval = setInterval(() => {
                prog += Math.random() * 12;
                if (prog > 100) prog = 100;
                progressBar.style.width = prog + '%';
                const stepIndex = Math.min(Math.floor((prog / 100) * steps.length), steps.length - 1);
                bootStatusSpan.innerText = steps[stepIndex] + '...';
                if (prog === 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        const loader = document.getElementById('init-loader');
                        loader.style.opacity = '0';
                        setTimeout(() => {
                            loader.style.display = 'none';
                            showMessage("AR ENGINE ONLINE");
                            // after loader, enable placement hint when surface detected
                        }, 400);
                    }, 180);
                }
            }, 45);
        }

        // Render asset buttons inside drawer
        function buildAssetListUI() {
            assetListContainer.innerHTML = '';
            ASSETS.forEach((asset, idx) => {
                const btn = document.createElement('button');
                btn.className = `asset-btn ${idx === currentAssetIndex ? 'active' : ''}`;
                btn.innerText = asset.name;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    setActiveAsset(idx);
                });
                assetListContainer.appendChild(btn);
            });
        }

        function setActiveAsset(index) {
            currentAssetIndex = index;
            const asset = ASSETS[index];
            currentAssetNameSpan.innerText = asset.name;
            // update button active states
            document.querySelectorAll('#asset-list-container .asset-btn').forEach((btn, i) => {
                if (i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            showMessage(`Selected: ${asset.name}`, 1200);
        }

        // AR placement: create a 3D plane with Sketchfab thumbnail texture + link interaction
        function placeImageAtPosition(x, y, z) {
            const container = document.getElementById('placed-container');
            if (!container) return;
            const asset = ASSETS[currentAssetIndex];
            if (!asset.thumbUrl) return;

            const entityId = `img_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
            const plane = document.createElement('a-plane');
            plane.setAttribute('id', entityId);
            plane.setAttribute('class', 'placed-image');
            plane.setAttribute('width', '1.6');
            plane.setAttribute('height', '1.6');
            plane.setAttribute('position', `${x} ${y + 0.05} ${z}`);
            plane.setAttribute('rotation', '0 0 0');
            // texture from Sketchfab thumbnail
            plane.setAttribute('material', `src: url(${asset.thumbUrl}); shader: standard; side: double; transparent: false;`);
            
            // interactive components
            plane.setAttribute('xrextras-hold-drag', '');
            plane.setAttribute('xrextras-two-finger-rotate', '');
            plane.setAttribute('xrextras-pinch-scale', 'minScale: 0.4; maxScale: 2.2;');
            
            // store metadata for click handler
            plane.setAttribute('data-sketchfab-link', asset.sketchfabUrl);
            plane.setAttribute('data-asset-name', asset.name);
            
            // add click event listener to open full model on Sketchfab
            plane.addEventListener('click', (evt) => {
                evt.stopPropagation();
                const url = evt.target.getAttribute('data-sketchfab-link');
                if (url) {
                    window.open(url, '_blank');
                    showMessage(`Opening: ${asset.name}`, 1400);
                }
            });
            
            container.appendChild(plane);
            showMessage(`Placed: ${asset.name} (tap to open 3D viewer)`, 1800);
        }

        // Clear all placed images
        function clearAllPlacements() {
            const container = document.getElementById('placed-container');
            if (container) {
                while (container.firstChild) container.removeChild(container.firstChild);
                showMessage("All placed objects removed", 1500);
            }
        }

        // Recenter AR position (XrController recenter)
        function recenterARSession() {
            if (window.XR8 && XR8.XrController && XR8.XrController.recenter) {
                XR8.XrController.recenter();
                showMessage("AR view recentered", 1000);
            } else {
                console.warn("Recenter not yet available");
                showMessage("Recenter available after XR ready", 1500);
            }
        }

        // Hard reset (reload page after brief pause)
        function hardReset() {
            showMessage("Restarting engine...", 1200);
            setTimeout(() => {
                window.location.reload();
            }, 400);
        }

        // Flashlight (torch) control using mediaDevices
        async function toggleFlashlight() {
            try {
                if (!mediaStreamTrack) {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    mediaStreamTrack = stream.getVideoTracks()[0];
                }
                const capabilities = mediaStreamTrack.getCapabilities();
                if (capabilities.torch) {
                    isFlashActive = !isFlashActive;
                    await mediaStreamTrack.applyConstraints({ advanced: [{ torch: isFlashActive }] });
                    torchBtn.classList.toggle('active', isFlashActive);
                    showMessage(isFlashActive ? "TORCH ACTIVE" : "TORCH OFF", 1000);
                } else {
                    showMessage("Torch not supported on this device", 1200);
                }
            } catch (err) {
                console.error("flash error", err);
                showMessage("Flash unavailable", 1000);
            }
        }

        // ---------- AR SURFACE DETECTION & PLACEMENT ----------
        function attachARPlacementEvents() {
            const groundPlane = document.querySelector('.placement-ground');
            if (!groundPlane) return;
            
            // trigger when surface detection becomes active (xrweb surface)
            window.addEventListener('xrprojectwayspottingfound', () => {
                placementHint.style.display = 'block';
                setTimeout(() => {
                    if (placementHint.style.display === 'block') placementHint.style.display = 'flex';
                }, 3000);
            });
            
            // listen to clicks on the ground plane
            groundPlane.addEventListener('click', (evt) => {
                const intersection = evt.detail.intersection;
                if (intersection && intersection.point) {
                    const { x, y, z } = intersection.point;
                    placeImageAtPosition(x, y, z);
                    if (placementHint.style.display !== 'none') {
                        placementHint.style.display = 'none';
                    }
                } else {
                    // fallback: basic camera forward placement (in case ground detection edge)
                    const camera = document.getElementById('main-camera');
                    if (camera) {
                        const forward = new THREE.Vector3(0, 0, -2);
                        const pos = camera.object3D.position.clone().add(forward);
                        placeImageAtPosition(pos.x, pos.y - 0.2, pos.z);
                    }
                }
            });
        }

        // Drawer toggle & global handlers
        function toggleDrawer(open) {
            isDrawerOpen = open !== undefined ? open : !isDrawerOpen;
            drawer.classList.toggle('open', isDrawerOpen);
        }

        function initUIEventHandlers() {
            openBtn.addEventListener('click', () => toggleDrawer(true));
            closeBtn.addEventListener('click', () => toggleDrawer(false));
            torchBtn.addEventListener('click', toggleFlashlight);
            clearAllBtn.addEventListener('click', clearAllPlacements);
            recenterBtn.addEventListener('click', recenterARSession);
            resetBtn.addEventListener('click', hardReset);
            // close drawer if click outside? optional but not required
        }

        // Initialize Lucide icons and core setup
        function initLucide() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        // Wait for xr.js and 8th Wall ready event
        function waitForXrAndStart() {
            if (window.XR8 && XR8.isInitialized) {
                console.log("8th Wall ready");
                attachARPlacementEvents();
                // try to re-init flashlight track later if needed
                return;
            }
            window.addEventListener('xrloaded', () => {
                console.log("xrloaded event triggered");
                attachARPlacementEvents();
                // Also attempt to apply any missing components
                setTimeout(() => {
                    if (window.XR8 && XR8.XrController && window.XR8.XrController.recenter) {
                        // recenter optional after load
                    }
                }, 800);
            });
        }

        // boot everything
        function boot() {
            initLucide();
            buildAssetListUI();
            setActiveAsset(0);
            initUIEventHandlers();
            simulateLoaderAndStart();
            waitForXrAndStart();
            
            // proactive: handle Flash not being ready
            setTimeout(() => {
                if (!mediaStreamTrack && navigator.mediaDevices) {
                    // pre-warm flashlight permission hint only if user taps torch later
                }
            }, 1000);
        }

        // start when DOM ready
        window.addEventListener('DOMContentLoaded', boot);
        
        // additional: cleanup on page unload if needed
        window.addEventListener('beforeunload', () => {
            if (mediaStreamTrack) {
                mediaStreamTrack.stop();
            }
        });
        
        // also allow custom event for surface placement repeated
        if (typeof AFRAME !== 'undefined') {
            AFRAME.registerComponent('xrweb-surface-listener', {
                init: function() {
                    this.el.addEventListener('click', (evt) => {
                        if (evt.detail && evt.detail.intersection && evt.detail.intersection.point) {
                            const p = evt.detail.intersection.point;
                            if (typeof placeImageAtPosition === 'function') {
                                placeImageAtPosition(p.x, p.y, p.z);
                                const hint = document.getElementById('placement-hint');
                                if (hint) hint.style.display = 'none';
                            }
                        }
                    });
                }
            });
            // ensure ground entity gets component
            const groundEl = document.querySelector('.placement-ground');
            if (groundEl && !groundEl.components['xrweb-surface-listener']) {
                groundEl.setAttribute('xrweb-surface-listener', '');
            }
        }
    </script>
</body>
  </html>
