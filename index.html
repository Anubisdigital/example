<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Logic Hub</title>
    <style>
        /* CSS: Controls the layout and "feel" */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            width: 350px;
            text-align: center;
        }

        h2 { color: #38bdf8; margin-bottom: 1.5rem; }

        select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
        }

        button {
            background-color: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #7dd3fc; }

        #result {
            margin-top: 20px;
            padding: 10px;
            background: #334155;
            border-radius: 4px;
            min-height: 50px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Physics Constants</h2>
        <select id="constantSelector">
            <option value="c">Speed of Light (c)</option>
            <option value="h">Planck Constant (h)</option>
            <option value="G">Gravitational Constant (G)</option>
        </select>
        
        <button onclick="displayConstant()">Get Value</button>

        <div id="result">Select a constant to see the value...</div>
    </div>

    <script>
        // JavaScript: The logic layer
        function displayConstant() {
            const selection = document.getElementById('constantSelector').value;
            const display = document.getElementById('result');
            
            const data = {
                c: "299,792,458 m/s",
                h: "6.626 x 10^-34 J⋅s",
                G: "6.674 x 10^-11 m^3⋅kg^-1⋅s^-2"
            };

            display.innerHTML = `<strong>Value:</strong><br>${data[selection]}`;
        }
    </script>

</body>
</html>
